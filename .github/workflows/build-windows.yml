# GitHub Actions: 在 Windows 虚拟机上自动打包桌面宠物为 .exe
# 推送代码或手动触发后，GitHub 会用 Windows 环境打包，
# 同时产出现代 Windows 版和 Windows 7 兼容版。
name: Build Windows

on:
  # 推送到任何分支时自动触发
  push:
    branches: ["**"]
  # 允许手动触发（在 GitHub 仓库 Actions 页点 Run workflow）
  workflow_dispatch:

# Release 写入需要显式授权（默认 GITHUB_TOKEN 无 contents:write）
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            python: "3.11"
            qt_api: pyside6
            requirements: requirements.txt
            archive: DesktopCat-windows.zip
          - target: windows7
            python: "3.8"
            qt_api: pyside2
            requirements: requirements-win7.txt
            archive: DesktopCat-windows7.zip
    env:
      DESKTOP_CAT_QT_API: ${{ matrix.qt_api }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: "x64"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ matrix.requirements }}
          python -m pip install "pyinstaller==6.21.0" "pytest>=7,<9"

      - name: 验证运行时与测试
        run: |
          python --version
          python -c "import cat.qt; print('Qt binding:', cat.qt.QT_BINDING)"
          python -m pytest -q

      - name: 打包（PyInstaller）
        run: python -m PyInstaller desktop-cat.spec --noconfirm

      - name: 瘦身（删除无用 Qt 模块）
        run: python scripts/strip_app.py win
        shell: bash

      - name: 验证 Win7 包未混入现代运行时
        if: matrix.target == 'windows7'
        shell: pwsh
        run: |
          $forbidden = Get-ChildItem dist\DesktopCat -Recurse | Where-Object {
            $_.FullName -match 'PySide6|Qt6Core\.dll|python311\.dll'
          }
          if ($forbidden) {
            $forbidden | ForEach-Object { Write-Error $_.FullName }
            exit 1
          }
          foreach ($required in @('python38.dll', 'Qt5Core.dll')) {
            if (-not (Get-ChildItem dist\DesktopCat -Recurse -Filter $required)) {
              Write-Error "Missing required Win7 runtime: $required"
              exit 1
            }
          }

      - name: 打包成 zip
        run: |
          cd dist
          Compress-Archive -Path DesktopCat -DestinationPath ../${{ matrix.archive }}
        shell: pwsh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: DesktopCat-${{ matrix.target }}
          path: ${{ matrix.archive }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: DesktopCat-*
          path: release-files
          merge-multiple: true

      # 自动发布到 Release（便于用 ghproxy 等国内镜像加速下载）
      # Release 名固定为 windows-latest，每次打包覆盖更新。
      # 下载加速：在下载 URL 前加 https://ghproxy.com/
      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: Windows 最新版
          make_latest: true
          body: |
            Windows 版桌面宠物猫（自动打包）。

            - `DesktopCat-windows.zip`：Windows 10/11，Python 3.11 + Qt 6
            - `DesktopCat-windows7.zip`：Windows 7 SP1 x64，Python 3.8 + Qt 5

            ## 下载加速（国内）
            如果 GitHub 下载慢，复制下面链接到浏览器，或在前面加 `https://ghproxy.com`：
            ```
            https://ghproxy.com/https://github.com/zyf2333/desktop-cat/releases/download/windows-latest/DesktopCat-windows.zip
            https://ghproxy.com/https://github.com/zyf2333/desktop-cat/releases/download/windows-latest/DesktopCat-windows7.zip
            ```

            ## 使用
            1. 按系统版本下载并解压对应 zip
            2. 进入 DesktopCat 文件夹
            3. 双击 DesktopCat.exe 启动
            4. 首次运行如被 SmartScreen 拦截：点「更多信息」→「仍要运行」

            无需安装 Python 或任何依赖。
          files: release-files/*.zip
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
